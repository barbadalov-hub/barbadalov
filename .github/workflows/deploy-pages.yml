name: Deploy web to GitHub Pages

# Publishes the Flutter web build to GitHub Pages so the app has a real URL:
#   https://barbadalov-hub.github.io/barbadalov/
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# (Private repos need GitHub Pro/Team for Pages, or make the repo public.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true
      - run: flutter pub get
      # Pages serves under /<repo>/, and CanvasKit is vendored so it works with
      # no third-party CDN.
      - run: flutter build web --release --no-web-resources-cdn --base-href "/barbadalov/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
