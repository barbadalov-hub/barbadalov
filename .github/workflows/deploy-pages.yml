name: Deploy web to GitHub Pages

# Publishes the Flutter web build to GitHub Pages so the app has a real URL:
#   https://barbadalov-hub.github.io/barbadalov/
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# (Private repos need GitHub Pro/Team for Pages, or make the repo public.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.5
          channel: stable
          cache: true
      - run: flutter pub get
      # Pages serves under /<repo>/, and CanvasKit is vendored so it works with
      # no third-party CDN.
      #
      # Firebase config for the LifeOS (lifeos-arkadiy) project. A web apiKey is
      # a PUBLIC identifier (it ships in every web build; security comes from the
      # Firestore rules), so committing it here is standard and safe. The Google
      # OAuth Web client id is read from a repo Variable so the Google button can
      # be enabled later without a code change; empty keeps it hidden.
      - run: |
          flutter build web --release --no-web-resources-cdn \
            --base-href "/barbadalov/" \
            --dart-define=FIREBASE_PROJECT_ID="lifeos-arkadiy" \
            --dart-define=FIREBASE_API_KEY="AIzaSyBaT5c8GfbEqqKdcVVFwJVihkYMLqEbvXY" \
            --dart-define=FIREBASE_GOOGLE_CLIENT_ID="${{ vars.FIREBASE_GOOGLE_CLIENT_ID }}"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
