include: package:flutter_lints/flutter.yaml

analyzer:
  # `native/` holds native-app-only code staged for a future phone build. It
  # references phone-only packages that aren't in the web pubspec, so it is
  # excluded from analysis until it's wired in (see native/README.md).
  exclude:
    - native/**
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Treat missing awaits and dead code as errors — this is a "no chaos" codebase.
    unawaited_futures: error
    dead_code: error

linter:
  rules:
    - always_declare_return_types
    - prefer_const_constructors
    - prefer_final_locals
    - unawaited_futures
    - sort_child_properties_last
    # NOTE: `require_trailing_commas` is intentionally omitted — it conflicts
    # with the Dart 3.7+ "tall" formatter, which owns comma placement now.
